[mod-setting-description]
PY_Stone_Gone=Removes stone from landfill recipe.\n\nDisabling all setting makes this recipe infinite.
PY_Gravel_Gone=Removes gravel from landfill recipe.\n\nDisabling all setting makes this recipe infinite.
PY_Soil_Gone=Removes soil from landfill recipe.\n\nDisabling all setting makes this recipe infinite.
stone_landfill_cost=Amount if STONE used in landfill recipe.
gravel_landfill_cost=Amount if GRAVEL used in landfill recipe.
soil_landfill_cost=Amount if SOIL used in landfill recipe.